<!DOCTYPE html>

<html>

<head>
    {% load static %}

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% load bootstrap5 %}
    {% bootstrap_css %}   
    {% bootstrap_javascript %}

    <script type="text/javascript" src="{% static 'js/devices.js' %}"></script>
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Dashboard</a> 
        </div>
    </nav>

    <div id="deviceGrid" class="container mt-4">
        <div class="row g-3">
        {% for device in devices %}
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">

                <div class="card shadow-sm h-100">
                    <div class="card-body" data-device-id="{{ device.id }}"> 

                        <h5 class="card-title">
                            {{ device.name }}
                        </h5>

                        <p class="card-text">
                            MAC: {{ device.mac }}
                        </p>

                        <button class="btn btn-primary" onclick="wakeDevice(event)">Wake up</button>
                    </div>
                </div>
            </div> 
        {% endfor %} 
        </div>
    </div>

    <div class="modal" id="createModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Modal title</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
                <form id="createForm">
                    <div class="modal-body">
                        <input type="text" placeholder="Enter Device name" name="name" required>
                        <input type="text" placeholder="Enter MAC-Address" name="mac" required>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary" onsubmit="createDevice(event)">Save changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <button type="button" id="btnCreate" class="btn btn-primary btn-lg" data-bs-toggle="modal" data-bs-target="#createModal">+</button>
</body>

</html>
